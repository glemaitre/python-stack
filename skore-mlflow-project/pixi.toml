[workspace]
name = "skore-mlflow-project"
channels = ["https://prefix.dev/conda-forge"]
platforms = ["osx-arm64"]
preview = ["pixi-build"]

[package]
name = { workspace = true }
authors = ["skore developers"]
description = "Own your data science"
version = "0.11.0.dev0"

[package.build.backend]
channels = [
  "https://prefix.dev/conda-forge",
]
name = "pixi-build-python"
version = "*"

[package.build.config]
noarch = true

[package.build.source]
path = "skore-mlflow-project/skore-mlflow-project"

[package.build-dependencies]
python = "~=3.13.0"

[package.host-dependencies]
uv = "*"
python = "~=3.13.0"
hatchling = "*"

[package.run-dependencies]
python = "~=3.13.0"
mlflow = ">=3.10.0"
joblib = "*"
matplotlib = "*"
rich = "*"
ninja = "*"
scikit-learn = { path = "../scikit-learn" }
skops = { path = "../skops" }

[feature.source.dependencies]
skore-mlflow-project = { path = "." }
skops = { path = "../skops" }

[feature.dev.dependencies]
ipykernel = "*"
ipython = "*"
jupyterlab = "*"

[feature.tests.dependencies]
pytest = "*"
pytest-xdist = "*"

[environments]
dev = { features = ["source", "dev", "tests"], no-default-feature = true }