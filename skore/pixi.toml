[workspace]
name = "skore"
channels = ["https://prefix.dev/conda-forge"]
platforms = ["osx-arm64"]
preview = ["pixi-build"]

[package]
name = { workspace = true }
authors = ["skore developers"]
description = "Own your data science"
version = "0.11.0.dev0"

[package.build.backend]
channels = [
  "https://prefix.dev/conda-forge",
]
name = "pixi-build-python"
version = "*"

[package.build.config]
noarch = true

[package.build.source]
path = "skore/skore"

[package.build-dependencies]
python = "~=3.13.0"

[package.host-dependencies]
uv = "*"
python = "~=3.13.0"
hatchling = "*"

[package.run-dependencies]
python = "~=3.13.0"
anywidget = "*"
ipywidgets = "*"
joblib = "*"
matplotlib = "*"
numpy = "*"
pandas = "*"
plotly = "*"
rich = "*"
seaborn = "*"
scikit-learn = { path = "../scikit-learn" }
skrub = { path = "../skrub" }

[feature.source.dependencies]
ninja = "*"
scikit-learn = { path = "../scikit-learn" }
skore = { path = "." }

[feature.local.dependencies]
diskcache = "*"
platformdirs = "*"

[feature.hub.dependencies]
httpx = "*"
orjson = "*"
pydantic = "*"

[feature.mlflow.dependencies]
mlflow = ">=3"

[feature.dev.dependencies]
ipykernel = "*"
ipython = "*"
jupyterlab = "*"
jupytext = "*"
tabulate = "*"
# for demo
polars = "*"
pyarrow = "*"
pydot = "*"
optuna = "*"
optuna-dashboard = "*"
plotly = "*"
holidays = "*"
graphviz = "*"

[feature.dev.activation]
scripts = ["activate_dot.sh"]

[feature.lint.dependencies]
pre-commit = "==4.3.0"

[feature.lint.tasks.lint]
cmd = "pre-commit install && pre-commit run -v --all-files --show-diff-on-failure"
cwd = "skore/skore"

[feature.tests.dependencies]
pytest = "*"
pytest-cov = "*"
pytest-order = "*"
pytest-randomly = "*"
pytest-xdist = "*"
xdoctest = "*"
polars = "*"
pyarrow = "*"

[feature.tests.tasks]
tests = { cmd = "pytest -vsl --cov=skore --cov-report=xml --cov-report=term-missing -n auto", cwd = "skore/skore/tests" }

[feature.docs.dependencies]
altair = "*"
numpydoc = "*"
plotly = "*"
pydata-sphinx-theme = "*"
python-kaleido = "*"
sphinx = "*"
sphinx-design = "*"
sphinx-gallery = "*"
sphinx-copybutton = "*"
sphinx-tabs = "*"
sphinx-autosummary-accessors = "*"
sphinx-issues = "*"
setuptools = "<81"
xgboost = "*"

[feature.docs.tasks]
docs = { cmd = "make html", cwd = "skore/sphinx" }

[environments]
dev = { features = ["source", "local", "hub", "mlflow", "dev", "docs", "lint", "tests"], no-default-feature = true }

[dependencies]
pytest = ">=9.0.2,<10"
