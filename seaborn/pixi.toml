[workspace]
preview = ["pixi-build"]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["osx-arm64"]

[package]
name = "seaborn"
version = "0.14.0.dev0"

[package.build.backend]
name = "pixi-build-python"
version = "*"

[package.build.config]
noarch = true

[package.build.source]
path = "seaborn"

[package.build-dependencies]
python = "~=3.13.0"

[package.host-dependencies]
python = "~=3.13.0"
flit = "*"

[package.run-dependencies]
python = "~=3.13.0"
numpy = ">=1.20"
pandas = ">=1.2"
matplotlib = ">=3.4"

[feature.source.dependencies]
seaborn = { path = "." }

[feature.dev.dependencies]
ipykernel = "*"
ipython = "*"
jupyterlab = "*"

[feature.docs.dependencies]
numpydoc = "*"
nbconvert = "*"
ipykernel = "*"
sphinx = "<6.0.0"
sphinx-copybutton = "*"
sphinx-issues = "*"
sphinx-design = "*"
pyyaml = "*"
pydata-sphinx-theme = "*"

[feature.tests.dependencies]
pytest = ">=7.2.2,<9"
pytest-cov = ">=4.1.0,<6"
pytest-xdist = ">=3.5.0,<4"

[feature.docs.tasks]
build-docs = { cmd = "make html", cwd = "seaboarn/doc" }

[feature.tests.tasks]
tests = { cmd = "pytest -n auto --cov=seaborn --cov=tests --cov-config=setup.cfg tests", cwd = "seaborn" }

[environments]
dev = { features = ["source", "dev", "docs", "tests"], no-default-feature = true }
