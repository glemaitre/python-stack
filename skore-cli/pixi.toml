[workspace]
name = "skore-cli"
channels = ["https://prefix.dev/conda-forge"]
platforms = ["osx-arm64"]
preview = ["pixi-build"]

[package]
name = { workspace = true }
authors = ["skore developers"]
description = "Command-line interface for skore"
version = "0.0.1.dev0"

[package.build.backend]
channels = [
  "https://prefix.dev/conda-forge",
]
name = "pixi-build-python"
version = "*"

[package.build.config]
noarch = true

[package.build.source]
path = "skore-cli"

[package.build-dependencies]
python = "~=3.13.0"

[package.host-dependencies]
uv = "*"
python = "~=3.13.0"
hatchling = "*"

[package.run-dependencies]
python = "~=3.13.0"
click = "*"
rich = ">=14.2"
rich-click = ">=1.9"
textual = "*"

[feature.source.dependencies]
skore-cli = { path = "." }

[feature.test.dependencies]
pytest = "*"
pytest-asyncio = "*"
pytest-cov = "*"
pytest-order = "*"
pytest-randomly = "*"
pytest-xdist = "*"
pre-commit = "*"

[feature.dev.dependencies]
ipykernel = "*"
ipython = "*"

[environments]
source = { features = ["source"] }
test = { features = ["source", "test"] }
dev = { features = ["source", "test", "dev"] }
